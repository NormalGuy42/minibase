<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="/favicons/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050505" />

    <!-- Primary Meta Tags -->
    <title>Minibase | Ship ten products. Pay for one backend.</title>
    <meta name="title" content="Minibase | Ship ten products. Pay for one backend." />
    <meta name="description" content="Postgres databases, REST APIs, auth, and file storage for all your projects. One subscription. No database pausing. The backend for indie hackers who ship." />

    <meta name="author" content="Minibase" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://minibase.dev/" />
    <meta property="og:title" content="Minibase | Ship ten products. Pay for one backend." />
    <meta property="og:description" content="Postgres databases, REST APIs, auth, and file storage for all your projects. One subscription. No database pausing." />
    <meta property="og:image" content="https://minibase.dev/main-og-image.png" />
    <meta property="og:image:secure_url" content="https://minibase.dev/main-og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Minibase - Ship ten products. Pay for one backend." />
    <meta property="og:site_name" content="Minibase" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@minibase" />
    <meta name="twitter:creator" content="@madiou" />
    <meta name="twitter:title" content="Minibase | Ship ten products. Pay for one backend." />
    <meta name="twitter:description" content="Postgres databases, REST APIs, auth, and file storage for all your projects. One subscription. No database pausing." />
    <meta name="twitter:image" content="https://minibase.dev/main-og-image.png" />
    <meta name="twitter:image:alt" content="Minibase - Ship ten products. Pay for one backend." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://minibase.dev/" />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Minibase",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "description": "Postgres databases, REST APIs, auth, and file storage for all your projects. One subscription. No database pausing.",
      "url": "https://minibase.dev",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "Minibase",
        "url": "https://minibase.dev"
      }
    }
    </script>
    
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-background text-white antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
